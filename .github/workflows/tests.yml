name: QA Automation Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 9:00 MSK
  workflow_dispatch:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.demoblaze.com' }}
          API_URL: ${{ secrets.API_URL || 'https://api.demoblaze.com' }}

      - name: Generate Allure HTML report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-api
          path: allure-report/
          retention-days: 30

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.demoblaze.com' }}
          API_URL: ${{ secrets.API_URL || 'https://api.demoblaze.com' }}

      - name: Generate Allure HTML report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-ui
          path: allure-report/
          retention-days: 30

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Send Telegram notification
        run: |
          API_STATUS="${{ needs.api-tests.result }}"
          UI_STATUS="${{ needs.ui-tests.result }}"

          if [ "$API_STATUS" = "success" ] && [ "$UI_STATUS" = "success" ]; then
            EMOJI="✅"
            STATUS="PASSED"
          else
            EMOJI="❌"
            STATUS="FAILED"
          fi

          MESSAGE="${EMOJI} *QA Tests — ${STATUS}*
          
          📋 *Run:* \`#${{ github.run_number }}\`
          🌿 *Branch:* \`${{ github.ref_name }}\`
          👤 *Triggered by:* ${{ github.actor }}
          
          📊 *Results:*
          • API Tests: ${{ needs.api-tests.result == 'success' && '✅ passed' || '❌ failed' }}
          • UI Tests: ${{ needs.ui-tests.result == 'success' && '✅ passed' || '❌ failed' }}
          
          🔗 [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="${MESSAGE}"
        if: secrets.TELEGRAM_BOT_TOKEN != ''
